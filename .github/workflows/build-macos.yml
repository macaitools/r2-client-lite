name: Build macOS App

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Package app
        run: bash scripts/package_app.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: R2Desk-macOS
          path: |
            dist/R2Desk-macOS.zip
            dist/R2Desk-macOS.dmg
